<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalamkaari - Dil Par Nishana</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,500&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #030607; font-family: 'Poppins', sans-serif; }

        /* 🎬 Cinematic Premium Background */
        .game-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #0c0f12 0%, #010203 100%);
            padding: 15px;
        }

        .game-header {
            text-align: center;
            margin-bottom: 15px;
            z-index: 10;
        }
        .game-header h2 {
            color: #ef4444; /* Crimson Red */
            font-size: 1.5rem;
            letter-spacing: 3px;
            font-weight: 600;
            text-shadow: 0 0 20px rgba(239, 68, 68, 0.3);
        }
        .game-header p {
            color: #798f99;
            font-size: 0.8rem;
            margin-top: 4px;
        }

        /* 📱 Premium Glassmorphism Game Box */
        .arena-frame {
            position: relative;
            width: 100%;
            max-width: 400px;
            height: 70vh;
            background: rgba(255, 255, 255, 0.01);
            border: 2px solid rgba(239, 68, 68, 0.15);
            border-radius: 16px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.9), inset 0 0 30px rgba(239, 68, 68, 0.02);
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* 🎭 Poetry Reveal Overlay Screen */
        .screen-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(3, 6, 7, 0.98);
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 30px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 100;
        }
        .screen-overlay.active { opacity: 1; pointer-events: auto; }
        
        .poem-content {
            font-family: 'Playfair Display', serif;
            font-size: 1.35rem;
            color: #f1ebd9;
            line-height: 1.9;
            font-style: italic;
            text-shadow: 0 0 25px rgba(241,235,217,0.15);
        }
        .author-name {
            font-size: 0.85rem;
            color: #ef4444;
            margin-top: 25px;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 600;
        }
        .btn-close {
            margin-top: 40px;
            background: linear-gradient(135deg, #ef4444, #991b1b);
            color: #ffffff;
            border: none;
            padding: 10px 30px;
            border-radius: 20px;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 1px;
            box-shadow: 0 10px 20px rgba(239, 68, 68, 0.3);
        }
    </style>
</head>
<body>

<div class="game-wrapper">
    <div class="game-header">
        <h2>DIL PAR NISHANA</h2>
        <p>Teer ko piche khinchein aur udte hue dil par nishana lagayein</p>
    </div>

    <div class="arena-frame">
        <canvas id="archeryCanvas"></canvas>

        <div id="overlayScreen" class="screen-overlay">
            <div>
                <div class="poem-content">“Kuch khwaab mitti mein dafan hain,<br>Kuch lafzon ko panno par baha diya...<br>Kalam uthai jab humne dard mein,<br>Toh khuda ne dawat ko samundar bana diya.”</div>
                <div class="author-name">- Kaamil</div>
                <button class="btn-close" onclick="resetGame()">DOBARA KHELEIN</button>
            </div>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('archeryCanvas');
    const ctx = canvas.getContext('2d');
    const overlay = document.getElementById('overlayScreen');

    let w, h;
    function init() {
        const rect = canvas.parentElement.getBoundingClientRect();
        const dpr = window.devicePixelRatio || 1;
        canvas.width = rect.width * dpr;
        canvas.height = rect.height * dpr;
        ctx.scale(dpr, dpr);
        w = rect.width;
        h = rect.height;
    }
    window.addEventListener('resize', init);
    init();

    // 🏹 Physics & Game Objects
    let bow = { x: 50, y: 0, radius: 45, pullX: 0, pullY: 0, isDragging: false };
    let arrow = { x: 50, y: 0, vx: 0, vy: 0, state: 'idle', angle: 0 };
    let target = { x: 0, y: 150, size: 36, angle: 0, speed: 2.2, isDestroyed: false };
    let particles = [];
    
    bow.y = h / 2;
    resetArrow();

    function resetArrow() {
        arrow.x = bow.x;
        arrow.y = bow.y;
        arrow.vx = 0;
        arrow.vy = 0;
        arrow.state = 'idle';
    }

    // ⚡ Touch/Mouse Drag Mechanics
    function getMousePos(e) {
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return { x: clientX - rect.left, y: clientY - rect.top };
    }

    function startDrag(e) {
        if (arrow.state !== 'idle') return;
        const pos = getMousePos(e);
        if (Math.hypot(pos.x - bow.x, pos.y - bow.y) < 60) {
            bow.isDragging = true;
            if(window.navigator.vibrate) window.navigator.vibrate(10);
        }
    }

    function doDrag(e) {
        if (!bow.isDragging) return;
        const pos = getMousePos(e);
        
        let dx = pos.x - bow.x;
        let dy = pos.y - bow.y;
        let dist = Math.hypot(dx, dy);
        if (dist > 60) {
            dx = (dx / dist) * 60;
            dy = (dy / dist) * 60;
        }
        
        bow.pullX = dx;
        bow.pullY = dy;
        arrow.x = bow.x + dx;
        arrow.y = bow.y + dy;
    }

    function endDrag() {
        if (!bow.isDragging) return;
        bow.isDragging = false;

        arrow.vx = -bow.pullX * 0.28; 
        arrow.vy = -bow.pullY * 0.28;
        arrow.state = 'flying';
        
        bow.pullX = 0; bow.pullY = 0;
        if(window.navigator.vibrate) window.navigator.vibrate([20, 10]);
    }

    canvas.addEventListener('mousedown', startDrag);
    canvas.addEventListener('mousemove', doDrag);
    window.addEventListener('mouseup', endDrag);
    canvas.addEventListener('touchstart', startDrag);
    canvas.addEventListener('touchmove', doDrag);
    window.addEventListener('touchend', endDrag);

    // 🎨 Mathematical Vector Drawing for a Perfect 2D Heart Shape
    function drawHeart(ctx, x, y, size) {
        ctx.beginPath();
        ctx.moveTo(x, y - size / 4);
        // Top Left & Bottom Curve
        ctx.bezierCurveTo(x - size / 2, y - size * 0.75, x - size, y, x, y + size * 0.85);
        // Top Right & Bottom Curve
        ctx.bezierCurveTo(x + size, y, x + size / 2, y - size * 0.75, x, y - size / 4);
        ctx.closePath();
        ctx.fill();
    }

    // 💥 Create Red & Crystal Glass Shards on Hit
    function createShatterEffect(x, y) {
        for (let i = 0; i < 45; i++) {
            particles.push({
                x: x, y: y,
                vx: (Math.random() - 0.5) * 10,
                vy: (Math.random() - 0.5) * 10,
                radius: Math.random() * 3.5 + 1,
                alpha: 1,
                color: Math.random() > 0.4 ? '#ef4444' : (Math.random() > 0.5 ? '#f87171' : '#ffffff')
            });
        }
    }

    // 🎨 HD Animation Frame Loop
    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 🎯 1. Update and Render Moving Glass Heart
        if (!target.isDestroyed) {
            target.angle += 0.04 * target.speed;
            target.y = (h / 2) + Math.sin(target.angle) * (h * 0.35); // Sine wave oscillation
            target.x = w - 60;

            ctx.save();
            // Heart Glow Profile
            ctx.shadowColor = 'rgba(239, 68, 68, 0.6)';
            ctx.shadowBlur = 20;

            // Realistic Ruby Crystal Gradient Fill
            let heartGrad = ctx.createRadialGradient(target.x - 5, target.y - 10, 2, target.x, target.y, target.size);
            heartGrad.addColorStop(0, '#ff8a8a');
            heartGrad.addColorStop(0.4, '#ef4444');
            heartGrad.addColorStop(1, '#7f1d1d');
            ctx.fillStyle = heartGrad;
            
            drawHeart(ctx, target.x, target.y, target.size);

            // Minimalist Geometrical Aura Rings Around Heart
            ctx.shadowBlur = 0;
            ctx.strokeStyle = 'rgba(239, 68, 68, 0.2)';
            ctx.lineWidth = 1;
            ctx.beginPath(); 
            ctx.arc(target.x, target.y + 5, target.size * 0.8, 0, Math.PI * 2); 
            ctx.stroke();
            ctx.restore();
        }

        // 🏹 2. Draw Antique Gold Metallic Bow
        ctx.save();
        ctx.strokeStyle = '#d4af37';
        ctx.lineWidth = 4;
        ctx.lineCap = 'round';
        ctx.shadowColor = 'rgba(0,0,0,0.4)'; ctx.shadowBlur = 6;

        ctx.beginPath();
        ctx.arc(bow.x - 15, bow.y, bow.radius, -Math.PI / 2.2, Math.PI / 2.2);
        ctx.stroke();

        // Bending Bow String
        ctx.strokeStyle = 'rgba(255,255,255,0.35)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(bow.x - 10, bow.y - bow.radius);
        ctx.lineTo(bow.x + bow.pullX, bow.y + bow.pullY);
        ctx.lineTo(bow.x - 10, bow.y + bow.radius);
        ctx.stroke();
        ctx.restore();

        // 🚀 3. Draw Rotating Arrow
        if (arrow.state === 'flying' || bow.isDragging) {
            ctx.save();
            ctx.translate(arrow.x, arrow.y);
            
            if (arrow.state === 'flying') {
                arrow.angle = Math.atan2(arrow.vy, arrow.vx);
            } else {
                arrow.angle = Math.atan2(-bow.pullY, -bow.pullX);
            }
            ctx.rotate(arrow.angle);

            // Arrow Body
            ctx.strokeStyle = '#f8fafc';
            ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(-35, 0); ctx.lineTo(0, 0); ctx.stroke();

            // Tip
            ctx.fillStyle = '#d4af37';
            ctx.beginPath();
            ctx.moveTo(0, 0); ctx.lineTo(-8, -4); ctx.lineTo(-8, 4); ctx.closePath(); ctx.fill();

            // Tail Feathers
            ctx.fillStyle = 'rgba(214, 175, 55, 0.6)';
            ctx.beginPath();
            ctx.moveTo(-35, 0); ctx.lineTo(-42, -5); ctx.lineTo(-38, 0);
            ctx.lineTo(-42, 5); ctx.closePath(); ctx.fill();
            ctx.restore();
        }

        // 💥 4. Render Shard Particles Engine
        particles.forEach((p, index) => {
            p.x += p.vx; p.y += p.vy; p.alpha -= 0.02;
            if (p.alpha <= 0) particles.splice(index, 1);
            ctx.fillStyle = p.color;
            ctx.globalAlpha = p.alpha;
            ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2); ctx.fill();
        });
        ctx.globalAlpha = 1;

        // 🌍 5. Physics Collision Calculations
        if (arrow.state === 'flying') {
            arrow.x += arrow.vx;
            arrow.y += arrow.vy;
            arrow.vy += 0.08; // Gravity Arc Drop Effect

            // Precise Collision Check with Heart Space Bounding Offset
            let distToTarget = Math.hypot(arrow.x - target.x, arrow.y - target.y);
            if (distToTarget < (target.size * 0.7) && !target.isDestroyed) {
                if(window.navigator.vibrate) window.navigator.vibrate([60, 40, 120]);
                createShatterEffect(target.x, target.y);
                target.isDestroyed = true;
                arrow.state = 'hit';
                setTimeout(() => { overlay.classList.add('active'); }, 700);
            }

            // Screen boundary reset on missing
            if (arrow.x > w + 50 || arrow.y > h + 50 || arrow.y < -50) {
                resetArrow();
            }
        }
    }

    function loop() {
        draw();
        requestAnimationFrame(loop);
    }
    loop();

    function resetGame() {
        target.isDestroyed = false;
        target.speed += 0.25; // Scale up speed challenge automatically!
        resetArrow();
        particles = [];
        overlay.classList.remove('active');
    }
</script>

</body>
</html>
