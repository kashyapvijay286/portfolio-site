<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siebel Blogs - Theeha</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo" onclick="window.location.href='index.html'">THEE<span>HA</span></div>
            <div class="nav-right">
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="kalamkaari.html">Kalamkaari</a></li>
                    <li><a href="siebel-blogs.html" class="active">Siebel Blogs</a></li>
                    <li><a href="kashmakash.html">Kashmakash</a></li>
                </ul>
                <button id="theme-toggle" class="theme-toggle-btn">🌙</button>
            </div>
        </nav>
    </header>
    <main>
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem;">
            <h1 style="font-size: 2rem;">Siebel <span>Blogs</span></h1>
            <button id="toggle-form-btn" class="btn" data-target="siebel">➕ Write a Blog</button>
        </div>

        <section class="submission-form" id="compose-form-siebel">
            <h2>Write Technical Blog</h2>
            <div class="form-group"><label>Blog Title</label><input type="text" id="blog-title" placeholder="e.g., Understanding Siebel EAI Architecture"></div>
            <div class="form-group"><label>Author Name</label><input type="text" id="blog-author" placeholder="Anonymous"></div>
            <div class="form-group"><label>Cover Image URL (Optional)</label><input type="text" id="blog-img" placeholder="https://images.unsplash.com/photo-..."></div>
            <div class="form-group"><label>Blog Content (All syntax, spacing & lines are preserved)</label><textarea id="blog-content" rows="6" placeholder="Type your technical logs here..."></textarea></div>
            <button id="blog-submit-btn" class="btn">Submit Post</button>
        </section>

        <div id="blogs-feed-container" class="feed-container"></div>
    </main>
    <footer><p>Copyright &copy; 2026 All rights reserved. Built to spread love by 909. ~ Theeha.</p></footer>

    <script src="js/main.js"></script>
</body>
