<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalamkaari - Theeha</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script>
      window.OneSignalDeferred = window.OneSignalDeferred || [];
      OneSignalDeferred.push(async function(OneSignal) {
        await OneSignal.init({
          appId: "a213d9d2-e579-43f2-975f-03b97acb3c8e",
        });
      });
    </script>
    <link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#000000">
<link rel="apple-touch-icon" href="/assets/icons/icon-192x192.png">
</head>
<body>

    <header>
        <nav>
            
            <button class="menu-toggle-hamburger" id="hamburger-menu-trigger"><span></span><span></span><span></span></button>
            <div class="nav-right">
                <ul class="nav-links" id="navbar-links-drawer">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="kalamkaari.html" class="active">Kalamkaari</a></li>
                    <li><a href="siebel-blogs.html">Siebel Blogs</a></li>
                    <li><a href="kashmakash.html">Kashmakash</a></li>
                </ul>
                <div class="logo" onclick="window.location.href='index.html'">THEE<span>HA</span></div>
                <div id="auth-container-gate"></div>
                <button id="theme-toggle" class="theme-toggle-btn">🌙</button>
            </div>
        </nav>
    </header>

    <main>
        <button id="toggle-form-btn" class="btn" data-target="kalamkaari">✒️ Write a Piece</button>
<span id="challenge-inline-display" style="font-size: 0.9rem; color: #6366f1; margin-left: 15px; font-weight: 500;">
    🎯 आज के शब्द: <b id="w1" style="color: #fbd556;">...</b>, <b id="w2" style="color: #fbd556;">...</b>
</span>
<a href="challenge.html" class="btn">🪷</a>
        <section class="submission-form" id="compose-form-kalamkaari">
            <h2>Compose Custom Piece</h2>


            <div class="form-group">
                <label>Your Name / Pen Name</label>
                <input type="text" id="input-author" placeholder="Anonymous">
            </div>
            
            <div class="form-group">
                <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 0.3rem;">
                    <label style="margin-bottom: 0;">Write your Quote or Article</label>
                    <button id="mic-btn-kalamkaari" type="button" class="btn" style="padding: 2px 8px; font-size: 0.75rem; background: var(--bg-secondary); border: 1px solid var(--border-color); color: var(--text-main); border-radius: 4px; cursor: pointer; transition: 0.3s;">🎙️</button>
                </div>
                <textarea id="input-content" placeholder="Share your wisdom or poetry..."></textarea>
            </div>
            
            <div class="custom-options-row" id="admin-flag-canvas">
                <div class="gradient-pickers">
                    <label style="font-size: 0.8rem; color: var(--text-muted); margin-right:0.3rem;">Canvas:</label>
                    <div class="grad-dot active" data-style="grad-default" style="background: #1e293b; border: 1px solid #fff;"></div>
                    <div class="grad-dot" data-style="grad-sunset" style="background: linear-gradient(135deg, #f97316, #ec4899);"></div>
                    <div class="grad-dot" data-style="grad-ocean" style="background: linear-gradient(135deg, #06b6d4, #3b82f6);"></div>
                    <div class="grad-dot" data-style="grad-neon" style="background: linear-gradient(135deg, #6366f1, #a855f7);"></div>
                    <div class="grad-dot" data-style="grad-emerald" style="background: linear-gradient(135deg, #059669, #10b981);"></div>
                    <div class="grad-dot" data-style="grad-cherry" style="background: linear-gradient(135deg, #dc2626, #f43f5e);"></div>
                    <div class="grad-dot" data-style="grad-midnight" style="background: linear-gradient(135deg, #0f172a, #1e1b4b);"></div>
                    <div class="grad-dot" data-style="grad-vintage" style="background: #f2ebd9; border:1px solid #ccc;"></div>
                </div>
                
                <div class="form-group" style="flex-direction:row; align-items:center; gap:0.4rem;">
                    <label style="white-space:nowrap; font-size: 0.8rem;">Tag:</label>
                    <select id="input-tag" class="sort-select" style="padding: 0.2rem 0.4rem; font-size:0.8rem;">
                        <option value="General">General</option>
                        <option value="Poetry">Poetry</option>
                        <option value="Motivation">Motivation</option>
                        <option value="Philosophy">Philosophy</option>
                    </select>
                </div>
            </div>
            <button id="submit-btn" class="btn">Publish to Feed</button>
        </section>

        <section>
            <div class="controls-header">
                <div class="search-bar" id="admin-flag-search">
                    <input type="text" id="search-input" placeholder="🔍 Search...">
                </div>
                <div style="display:flex; gap:0.5rem;">
                    <select id="filter-tag" class="sort-select">
                        <option value="All">All Tags</option>
                        <option value="General">General</option>
                        <option value="Poetry">Poetry</option>
                        <option value="Motivation">Motivation</option>
                        <option value="Philosophy">Philosophy</option>
                    </select>
                    <select id="sort-feed" class="sort-select">
                        <option value="recent">Recent</option>
                        <option value="likes">Likes</option>
                    </select>
                </div>
            </div>
            <div id="feed-container" class="feed-container"></div>
        </section>
    </main>

    <footer style="text-align: center; color: var(--text-muted); padding: 20px; font-size: 0.9rem;">
        <p>Copyright &copy; 2026 All rights reserved. Built to spread love by 909. ~ Theeha.</p>
    </footer>
    
   <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    
    <script src="js/firebase-config.js"></script>
    <script src="js/theme-nav.js"></script>
    <script src="js/auth-user.js"></script>
    <script src="js/interactions.js"></script>
    <script src="js/data-feeds.js"></script>
    <script src="js/admin-panel.js"></script>
    <script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/service-worker.js')
                .then(registration => {
                    console.log('Service Worker registered successfully!', registration.scope);
                })
                .catch(err => {
                    console.log('Service Worker registration failed:', err);
                });
        });
    }
</script>
</body>
</html>
