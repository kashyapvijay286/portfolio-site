<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalamkaari - Theeha</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <nav>
            <div class="logo">THEE<span>HA</span></div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="kalamkaari.html" class="active">Kalamkaari</a></li>
                <li><a href="siebel-blogs.html">Siebel Blogs</a></li>
                <li><a href="kashmakash.html">Kashmakash</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="submission-form">
            <h2>Compose Content</h2>
            <div class="form-group">
                <label for="input-author">Your Name / Pen Name</label>
                <input type="text" id="input-author" placeholder="Anonymous">
            </div>
            <div class="form-group">
                <label for="input-content">Write your Quote or Article</label>
                <textarea id="input-content" rows="4" placeholder="Share your wisdom or story here..."></textarea>
            </div>
            <button id="submit-btn" class="btn">Publish to Feed</button>
        </section>

        <section>
            <div class="controls-header">
                <h2>The Showcase Feed</h2>
                <div>
                    <label for="sort-feed" style="font-size: 0.9rem; color: var(--text-muted); margin-right: 0.5rem;">Sort by:</label>
                    <select id="sort-feed" class="sort-select">
                        <option value="recent">Most Recent</option>
                        <option value="likes">Popularity (Likes)</option>
                    </select>
                </div>
            </div>

            <div id="feed-container" class="feed-container">
                </div>
        </section>
    </main>

    <footer>
        <p>Copyright &copy; 2026 All rights reserved. Built to spread love by VIJAY KASHYAP. ~ Theeha.</p>
    </footer>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script src="js/main.js"></script>
</body>
</html>
