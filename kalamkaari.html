<body>

<script>
// ----------------------------------------------------
// 🔒 ADVANCED CENTRAL LOGIN WALL ENGINE (With Firestore Guest Sync)
// ----------------------------------------------------
document.addEventListener("DOMContentLoaded", () => {
    const loginBtn = document.getElementById('wall-login-btn');
    const guestTrigger = document.getElementById('wall-guest-trigger');

    // Sync Master Toggle for Guest Portal Access Realtime
    if(typeof db !== 'undefined' && guestTrigger) {
        db.collection("system_flags").doc("config").onSnapshot(doc => {
            if(doc.exists) {
                let isGuestAllowed = doc.data().guest_global_access !== false;
                guestTrigger.style.display = isGuestAllowed ? 'inline-block' : 'none';
            } else {
                guestTrigger.style.display = 'inline-block';
            }
        });
    }

    if(loginBtn) {
        loginBtn.addEventListener('click', async () => {
            const uname = document.getElementById('wall-username').value.trim();
            const pin = document.getElementById('wall-pin').value.trim();
            
            if(!uname || !pin) return alert("❌ Username aur PIN dono daalein!");
            if(uname.toLowerCase() === "guest") return alert("❌ 'Guest' आरक्षित नाम है! कृपया कोई दूसरा नाम चुनें।");
            
            loginBtn.textContent = "⏳ Logging in..."; loginBtn.disabled = true;
            try {
                const doc = await db.collection("users_registry").doc(uname.toLowerCase()).get();
                if(doc.exists && doc.data().pin === pin) {
                    localStorage.setItem("theeha_user", doc.data().username); window.location.reload(); 
                } else if (!doc.exists) {
                    if(confirm(`"${uname}" का अकाउंट नहीं है। क्या नया अकाउंट बनाएं?`)) {
                        await db.collection("users_registry").doc(uname.toLowerCase()).set({
                            username: uname, pin: pin, timestamp: firebase.firestore.FieldValue.serverTimestamp(), canUsePenName: false
                        });
                        localStorage.setItem("theeha_user", uname); window.location.reload();
                    } else { loginBtn.textContent = "Login / Enter"; loginBtn.disabled = false; }
                } else { alert("❌ Galat PIN!"); loginBtn.textContent = "Login / Enter"; loginBtn.disabled = false; }
            } catch(e) { alert("Error: " + e.message); loginBtn.textContent = "Login / Enter"; loginBtn.disabled = false; }
        });
    }
});

// 🛠️ BULLETPROOF FIRESTORE VIRTUAL GUEST SYSTEM LINKER
window.continueAsGuest = async function() {
    const guestBtn = document.getElementById('wall-guest-trigger');
    if(guestBtn) guestBtn.textContent = "⏳ Accessing...";
    
    try {
        await db.collection("users_registry").doc("guest_id").set({
            username: "Guest",
            pin: "0000",
            canUsePenName: false,
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        }, { merge: true });

        localStorage.setItem("theeha_user", "Guest");
        window.location.reload();
    } catch(e) {
        alert("Guest access issue: " + e.message);
    }
};

// 🔄 FORCE BADGE RELOAD (theme-nav.js के असर को काउंटर करने के लिए)
window.addEventListener("load", () => {
    if(typeof currentUser !== 'undefined' && currentUser && window.location.reload && !sessionStorage.getItem('badge_forced')) {
        sessionStorage.setItem('badge_forced', 'true');
        // Let the central renderer catch up safely
        setTimeout(() => { window.location.reload(); }, 50);
    } else {
        sessionStorage.removeItem('badge_forced');
    }
});
</script>
