<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tukbandi Finder - Theeha</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .tukbandi-container {
            max-width: 600px;
            margin: 2rem auto;
            padding: 1.5rem;
            background: var(--bg-secondary);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            text-align: center;
        }
        .search-box-wrapper {
            display: flex;
            gap: 8px;
            margin: 1.5rem 0;
        }
        .search-box-wrapper input {
            flex: 1;
            padding: 0.7rem;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: var(--bg-primary);
            color: var(--text-main);
        }
        .results-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
        }
        .rhyme-tag {
            background: rgba(99, 102, 241, 0.1);
            color: #818cf8;
            border: 1px solid rgba(99, 102, 241, 0.3);
            padding: 0.4rem 0.8rem;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.2s;
        }
        .rhyme-tag:hover {
            background: #6366f1;
            color: white;
        }
        .empty-state {
            color: var(--text-muted);
            font-style: italic;
        }
    </style>
</head>
<body>

    <main>
        <div class="tukbandi-container">
            <h2>✍️ Tukbandi Finder</h2>
            <p>Apna shabd likhein aur live milti-julti tukbandi dhoondhein.</p>

            <div class="search-box-wrapper">
                <input type="text" id="rhyme-input" placeholder="Yahan shabd likhein...">
                <button class="btn" id="find-rhyme-btn">Khojein</button>
            </div>

            <div class="results-grid" id="rhyme-results">
                <p class="empty-state">Tukbandi dekhne ke liye upar shabd likhein...</p>
            </div>
        </div>
    </main>

    <script>
        document.getElementById('find-rhyme-btn').addEventListener('click', fetchRhymes);
        document.getElementById('rhyme-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') fetchRhymes();
        });

        async function fetchRhymes() {
            const inputVal = document.getElementById('rhyme-input').value.trim();
            const resultsContainer = document.getElementById('rhyme-results');
            
            if (!inputVal) {
                resultsContainer.innerHTML = '<p class="empty-state">Kripya koi shabd likhein!</p>';
                return;
            }

            resultsContainer.innerHTML = '<p class="empty-state" style="color: var(--accent-color);">⏳ Live server se shabd nikaal raha hoon...</p>';

            try {
                // Connecting to your updated backend endpoint
                const response = await fetch(`/api/rhyme?word=${encodeURIComponent(inputVal)}`);
                if (!response.ok) throw new Error("Server error");

                const matches = await response.json();
                resultsContainer.innerHTML = ""; 

                if (matches.length > 0) {
                    matches.forEach(word => {
                        const span = document.createElement('span');
                        span.className = 'rhyme-tag';
                        span.textContent = word;
                        
                        span.onclick = () => {
                            document.getElementById('rhyme-input').value = word;
                            fetchRhymes();
                        };
                        resultsContainer.appendChild(span);
                    });
                } else {
                    resultsContainer.innerHTML = `<p class="empty-state">Maaf kijiyega, koi shabd nahi mila.</p>`;
                }

            } catch (error) {
                console.error(error);
                resultsContainer.innerHTML = '<p class="empty-state" style="color: #ef4444;">Connect karne mein dikkat aayi, kripya dobara try karein.</p>';
            }
        }
    </script>
</body>
</html>
