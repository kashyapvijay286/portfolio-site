<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Kalamkaari - 3D Realistic Pond</title>
    
    <!-- ✨ Magical & Cinematic Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Poppins', sans-serif; touch-action: none; }
        #webgl-container { width: 100vw; height: 100vh; display: block; }
        
        .game-hud { position: absolute; top: 20px; left: 20px; z-index: 10; color: white; }
        .back-btn { color: #a7f3d0; text-decoration: none; font-weight: bold; background: rgba(0,0,0,0.5); padding: 10px 20px; border-radius: 20px; border: 1px solid #10b981; backdrop-filter: blur(5px);}
        
        /* 🏷️ FLOATING NAME TAGS */
        #name-tags-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 5; }
        .floating-name {
            position: absolute; color: #fff; font-size: 0.9rem; font-weight: 600;
            text-shadow: 0 0 10px rgba(255,255,255,0.8), 2px 2px 5px rgba(0,0,0,0.8);
            transform: translate(-50%, -100%); pointer-events: none; transition: opacity 0.2s;
        }

        /* 🔮 PREMIUM BLURRY TRANSPARENT UI (GLASSMORPHISM) */
        .lotus-modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 20, 15, 0.4); /* Gehra transparent hara/kaala */
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex; justify-content: center; align-items: center;
            z-index: 2000; opacity: 0; pointer-events: none; transition: 0.4s ease-in-out;
        }
        .lotus-modal-overlay.active { opacity: 1; pointer-events: auto; }
        
        .lotus-reading-card {
            /* Asli Frosted Glass Effect */
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-top: 1px solid rgba(255, 255, 255, 0.4);
            border-left: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 24px;
            width: 85%; max-width: 450px; padding: 50px 40px; text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5), inset 0 0 20px rgba(255,255,255,0.05);
            
            transform: scale(0.8) translateY(30px); 
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative; color: white;
        }
        .lotus-modal-overlay.active .lotus-reading-card { transform: scale(1) translateY(0); }
        
        /* ✨ CINEMATIC FONTS */
        .modal-quote { 
            font-family: 'Cinzel', serif; font-size: 1.8rem; line-height: 1.5; 
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.5); 
            margin-bottom: 30px; letter-spacing: 1px;
        }
        .modal-author { 
            font-family: 'Poppins', sans-serif; font-size: 0.9rem; font-weight: 400; 
            color: #a7f3d0; text-transform: uppercase; letter-spacing: 3px;
            text-align: right; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 20px;
        }
        
        .close-modal {
            position: absolute; top: 15px; right: 20px; background: none; border: none;
            color: rgba(255,255,255,0.6); font-size: 1.8rem; cursor: pointer; transition: 0.3s;
        }
        .close-modal:hover { color: white; transform: scale(1.2) rotate(90deg); text-shadow: 0 0 10px white; }
        
        #loading-screen { position: fixed; top:0; left:0; width: 100%; height: 100%; background: #000; color: white; display: flex; justify-content: center; align-items: center; z-index: 9999; font-size: 1.5rem; transition: 0.5s; }
    </style>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="js/firebase-config.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/objects/Water.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>

    <div id="loading-screen">⏳ Sowing Lotus Seeds...</div>

    <div class="game-hud">
        <a href="kalamkaari.html" class="back-btn">⬅ Leave Pond</a>
        <p style="text-shadow: 1px 1px 2px black;">👆 Drag to explore | <b style="color: #a7f3d0;">Double-Tap</b> to read</p>
    </div>

    <div id="name-tags-container"></div>
    <div id="webgl-container"></div>

    <div class="lotus-modal-overlay" id="reading-modal">
        <div class="lotus-reading-card">
            <button class="close-modal" onclick="closeLotusModal()">✖</button>
            <div class="modal-quote" id="modal-content"></div>
            <div class="modal-author" id="modal-author"></div>
        </div>
    </div>

    <script src="js/pond-3d.js"></script>
</body>
</html>
